    <!-- ═══════════════════════════
         MAIN
    ═══════════════════════════ -->
    <main class="main">

        <!-- Page header -->
        <header class="page-header page-header--with-action">
            <div>
                <h1 class="page-header__title" data-i18n="progetti.title">Progetti</h1>
                <p class="page-header__subtitle" data-i18n="progetti.subtitle">Gestione progetti e monitoraggio avanzamento</p>
            </div>
            <button class="btn-add" type="button" id="new-project-btn" hidden>
                <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd"/>
                </svg>
                <span data-i18n="progetti.newProject">Crea nuovo progetto</span>
            </button>
        </header>

        <!-- Search bar -->
        <div class="search-bar">
            <svg class="search-bar__icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
            </svg>
            <input
                type="search"
                class="search-bar__input"
                id="search-input"
                placeholder="Cerca"
                data-i18n-placeholder="common.search"
                aria-label="Cerca progetti"
                data-i18n-aria-label="progetti.searchAria"
                autocomplete="off"
            >
        </div>

        <!-- Project grid — GET /api/projects — populated by JS -->
        <section class="project-grid" id="project-grid" aria-label="Lista progetti" data-i18n-aria-label="progetti.listAria">
            <p class="state state--loading"><span data-i18n="common.loading">Caricamento in corso…</span></p>
        </section>

    </main>
</div>

<!-- ═══════════════════════════
     MODALE — Crea nuovo progetto
═══════════════════════════ -->
<div class="modal-overlay" id="create-modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="create-modal-title">
        <div class="modal__header">
            <h2 class="modal__title" id="create-modal-title" data-i18n="progetti.newProject">Crea nuovo progetto</h2>
            <button class="modal__close" type="button" id="create-modal-close-btn" aria-label="Chiudi">
                <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                </svg>
            </button>
        </div>

        <form id="create-form" novalidate>
            <div class="form-group">
                <label class="form-label" for="create-nome" data-i18n="field.nome">Nome</label>
                <input class="form-input" type="text" id="create-nome" placeholder="Nome del progetto" data-i18n-placeholder="progetti.namePlaceholder" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="create-desc" data-i18n="field.descrizione">Descrizione</label>
                <textarea class="form-textarea" id="create-desc" rows="3" placeholder="Descrizione del progetto" data-i18n-placeholder="progetti.descPlaceholder"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label" for="create-stato" data-i18n="field.stato">Stato</label>
                <select class="form-select" id="create-stato">
                    <option value="da fare" data-i18n="status.daFare">Da fare</option>
                    <option value="in corso" data-i18n="status.inCorso">In corso</option>
                    <option value="completato" data-i18n="status.completato">Completato</option>
                </select>
            </div>

            <div class="form-group">
                <span class="form-label" data-i18n="field.teamLeader">Team Leader</span>
                <div class="checklist" id="create-manager"></div>
            </div>

            <div class="form-group">
                <span class="form-label" data-i18n="field.membriTeam">Membri del team</span>
                <div class="checklist" id="create-members"></div>
            </div>

            <p class="form-error" id="create-form-error" hidden></p>

            <div class="modal__actions">
                <button class="btn-save" type="submit" id="create-save-btn">
                    <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M16.704 5.29a1 1 0 010 1.415l-7.09 7.09a1 1 0 01-1.415 0L3.296 8.89a1 1 0 111.415-1.415l4.196 4.197 6.382-6.382a1 1 0 011.415 0z" clip-rule="evenodd"/>
                    </svg>
                    <span data-i18n="common.create">Crea</span>
                </button>
                <button class="btn-cancel" type="button" id="create-cancel-btn" data-i18n="common.cancel">Annulla</button>
            </div>
        </form>
    </div>
</div>

<script src="i18n.js" defer></script>
