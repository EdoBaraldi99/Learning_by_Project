<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password dimenticata – Gestione e monitoraggio</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
<main class="login-page">
    <div class="login-card">
        <div class="login-avatar">TS</div>
        <h1 class="login-brand-title">TesiSquare</h1>
        <p class="login-subtitle" data-i18n="forgot.title">Password dimenticata</p>

        <form id="forgot-form" novalidate>
            <div class="form-group">
                <label class="form-label" for="forgot-email" data-i18n="field.email">Email</label>
                <input class="form-input" type="email" id="forgot-email" placeholder="email@azienda.it" data-i18n-placeholder="login.emailPlaceholder" required autocomplete="username">
            </div>

            <p class="form-error" id="forgot-form-error" hidden></p>

            <button class="btn-login" type="submit" id="forgot-submit-btn" data-i18n="forgot.submit">Invia richiesta</button>
            <p class="login-secondary-link"><a href="login.html" data-i18n="forgot.backToLogin">Torna al login</a></p>
        </form>

        <div class="dev-reset-box" id="dev-reset-box" hidden>
            <p class="dev-reset-box__title" data-i18n="forgot.devTitle">Modalità sviluppo — nessuna email è stata inviata</p>
            <p class="dev-reset-box__desc" data-i18n="forgot.devDesc">In un ambiente reale questo link ti sarebbe arrivato via email. Per ora, eccolo qui:</p>
            <a class="dev-reset-box__link" id="dev-reset-link" href="#"></a>
        </div>
    </div>
</main>

<script src="i18n.js" defer></script>
<script src="session.js" defer></script>
<script src="password-dimenticata.js" defer></script>
</body>
</html>
