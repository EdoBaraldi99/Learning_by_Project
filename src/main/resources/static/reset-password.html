<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reimposta password – Gestione e monitoraggio</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
<main class="login-page">
    <div class="login-card">
        <img class="login-avatar" src="logo.png" alt="TesiSquare">
        <h1 class="login-brand-title">TesiSquare</h1>
        <p class="login-subtitle" data-i18n="reset.title">Imposta una nuova password</p>

        <form id="reset-form" novalidate>
            <div class="form-group">
                <label class="form-label" for="reset-password" data-i18n="reset.newPassword">Nuova password</label>
                <div class="password-field">
                    <input class="form-input" type="password" id="reset-password" placeholder="Almeno 8 caratteri" data-i18n-placeholder="reset.placeholderMin8" required autocomplete="new-password">
                    <button class="password-toggle" type="button" id="reset-password-toggle" aria-label="Mostra password" aria-pressed="false">
                        <svg class="password-toggle__icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path d="M10 12.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z"/>
                            <path fill-rule="evenodd" d="M.664 10.59a1.651 1.651 0 010-1.186A10.004 10.004 0 0110 3c4.257 0 7.893 2.66 9.336 6.41.147.381.147.804 0 1.186A10.004 10.004 0 0110 17c-4.257 0-7.893-2.66-9.336-6.41zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="reset-password-confirm" data-i18n="reset.confirmPassword">Conferma nuova password</label>
                <div class="password-field">
                    <input class="form-input" type="password" id="reset-password-confirm" placeholder="Ripeti la password" data-i18n-placeholder="reset.placeholderRepeat" required autocomplete="new-password">
                    <button class="password-toggle" type="button" id="reset-password-confirm-toggle" aria-label="Mostra password" aria-pressed="false">
                        <svg class="password-toggle__icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path d="M10 12.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z"/>
                            <path fill-rule="evenodd" d="M.664 10.59a1.651 1.651 0 010-1.186A10.004 10.004 0 0110 3c4.257 0 7.893 2.66 9.336 6.41.147.381.147.804 0 1.186A10.004 10.004 0 0110 17c-4.257 0-7.893-2.66-9.336-6.41zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
                        </svg>
                    </button>
                </div>
            </div>

            <p class="form-error" id="reset-form-error" hidden></p>

            <button class="btn-login" type="submit" id="reset-submit-btn" data-i18n="reset.submit">Reimposta password</button>
            <p class="login-secondary-link"><a href="login.html" data-i18n="forgot.backToLogin">Torna al login</a></p>
        </form>
    </div>
</main>

<script src="i18n.js" defer></script>
<script src="session.js" defer></script>
<script src="reset-password.js" defer></script>
</body>
</html>
